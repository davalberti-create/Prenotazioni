<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Prenotazioni Ristorante</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1208;
    --surface: #241a0a;
    --surface2: #2e2010;
    --border: #5a3e1b;
    --gold: #c9933a;
    --gold-light: #e8b96a;
    --gold-dim: #7a5520;
    --text: #f0e6d0;
    --text-dim: #9a8060;
    --red: #c0392b;
    --red-light: #e74c3c;
    --green: #27ae60;
    --green-light: #2ecc71;
    --blue: #2980b9;
    --blue-light: #3498db;
    --radius: 10px;
    --font: 'Segoe UI', system-ui, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--gold-dim);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.5px;
  }
  .header-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .sync-btn {
    margin-left: auto;
    background: var(--gold-dim);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
  }
  .sync-btn:active { opacity: 0.7; }
  .sheets-btn {
    margin-left: auto;
    background: #0a2a18;
    border: 1px solid #0f9d58;
    color: #0f9d58;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
  }
  .sheets-btn:active { opacity: 0.7; }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TAB GIORNI */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 1;
    min-width: 80px;
    padding: 10px 8px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab.active {
    color: var(--gold-light);
    border-bottom-color: var(--gold);
  }
  .tab .day-name { font-size: 11px; display: block; }
  .tab .day-num { font-size: 16px; font-weight: 800; }

  /* MAIN LAYOUT */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* STATISTICHE */
  .stats-bar {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .stats-bar::-webkit-scrollbar { display: none; }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    text-align: center;
    min-width: 80px;
    flex-shrink: 0;
  }
  .stat-val { font-size: 20px; font-weight: 800; color: var(--gold-light); }
  .stat-lbl { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

  /* SEZIONE PRINCIPALE: lista + piantina */
  .content {
    display: flex;
    flex: 1;
    overflow: hidden;
    flex-direction: column;
  }

  /* LISTA PRENOTAZIONI */
  .pren-section {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
  }
  .pren-section h2 {
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .pren-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .pren-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .pren-card:active { background: var(--surface2); }
  .pren-card.selected {
    border-color: var(--gold);
    background: #2e2010;
  }
  .pren-card.has-table { border-left: 3px solid var(--green); }
  .pren-card.no-table { border-left: 3px solid var(--red-light); }
  .pren-card.arrived-card {
    background: #0d2a0d;
    border-color: var(--green);
    border-left: 3px solid var(--green);
  }
  .pren-card.arrived-card .pren-name { color: var(--green-light); }

  .pren-name {
    font-weight: 700;
    font-size: 14px;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pren-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .pren-persons {
    background: var(--surface2);
    border-radius: 6px;
    padding: 2px 7px;
    font-weight: 700;
    color: var(--text);
    font-size: 13px;
  }
  .pren-time { font-size: 11px; color: var(--text-dim); }
  .pren-table-badge {
    background: var(--green);
    color: white;
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .pren-table-badge.empty {
    background: var(--red);
    opacity: 0.8;
  }
  .pren-note {
    font-size: 10px;
    color: var(--text-dim);
    grid-column: 1/-1;
    margin-top: 2px;
    font-style: italic;
  }

  /* AGGIUNGI */
  .add-btn {
    width: 100%;
    background: var(--surface2);
    border: 1px dashed var(--gold-dim);
    color: var(--gold);
    border-radius: var(--radius);
    padding: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .add-btn:active { opacity: 0.7; }

  /* MODAL PIANTINA */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-top: 2px solid var(--gold);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 600px;
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-header {
    padding: 16px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .modal-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--gold-light);
    flex: 1;
  }
  .modal-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    width: 32px;
    height: 32px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }

  /* LEGENDA */
  .legend {
    display: flex;
    gap: 12px;
    margin-bottom: 10px;
    font-size: 11px;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; color: var(--text-dim); }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 3px;
  }

  /* PIANTINA */
  .floor-plan {
    background: #12100a;
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 12px 8px;
    position: relative;
  }

  .floor-label {
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* GRIGLIA TAVOLI */
  .tables-grid {
    display: grid;
    gap: 6px;
  }

  .table-btn {
    aspect-ratio: 1;
    border-radius: 8px;
    border: 2px solid transparent;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    position: relative;
    min-width: 0;
    line-height: 1.1;
  }
  .table-btn .t-num { font-size: 14px; font-weight: 800; }
  .table-btn .t-pren { font-size: 9px; font-weight: 500; margin-top: 1px; }

  .table-btn.free {
    background: #1a3a1a;
    border-color: var(--green);
    color: var(--green-light);
  }
  .table-btn.free:active { background: #1f4a1f; }

  .table-btn.partial {
    background: #3a3000;
    border-color: #e6c800;
    color: #ffe033;
  }
  .table-btn.partial:active { background: #4a3e00; }

  .table-btn.occupied {
    background: #3a1a1a;
    border-color: var(--red);
    color: #e88;
    cursor: default;
  }

  .table-btn.selected-table {
    background: var(--gold-dim);
    border-color: var(--gold-light);
    color: var(--gold-light);
    box-shadow: 0 0 0 3px rgba(201,147,58,0.3);
    transform: scale(1.05);
  }

  /* ZONE SPECIALI */
  .zone-divider {
    grid-column: 1 / -1;
    border-top: 1px solid var(--border);
    padding-top: 6px;
    margin-top: 2px;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* SELEZIONE CORRENTE */
  .selection-bar {
    padding: 10px 12px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .selection-info {
    flex: 1;
    font-size: 13px;
  }
  .selection-info strong { color: var(--gold-light); }
  .selection-info .sel-tables {
    font-size: 15px;
    font-weight: 800;
    color: var(--gold-light);
  }
  .confirm-btn {
    background: var(--gold);
    color: #1a1208;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
  }
  .confirm-btn:disabled {
    background: var(--gold-dim);
    color: var(--text-dim);
    cursor: default;
  }
  .confirm-btn:not(:disabled):active { opacity: 0.8; }

  /* MODAL NUOVA PRENOTAZIONE */
  .new-modal { border-radius: 20px 20px 0 0; }
  .form-group { margin-bottom: 12px; }
  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .form-group input, .form-group select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: var(--font);
    outline: none;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--gold);
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .save-btn {
    width: 100%;
    background: var(--gold);
    color: #1a1208;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 8px;
  }
  .save-btn:active { opacity: 0.8; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #2ecc71;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    z-index: 999;
    transition: transform 0.3s;
    white-space: nowrap;
  }
  .toast.error { background: var(--red-light); }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
  }
  .loading-spinner {
    font-size: 30px;
    display: block;
    animation: spin 1s linear infinite;
    margin-bottom: 10px;
  }


  /* SUBMENU A/B */
  .table-btn { position: relative; }
  .ab-menu {
    position: absolute;
    bottom: 105%;
    left: 50%;
    transform: translateX(-50%);
    background: #1e1508;
    border: 1.5px solid var(--gold);
    border-radius: 10px;
    padding: 6px;
    display: none;
    flex-direction: column;
    gap: 4px;
    z-index: 50;
    min-width: 80px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.7);
  }
  .ab-menu.open { display: flex; }
  .ab-menu::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: var(--gold);
  }
  .ab-opt {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    white-space: nowrap;
  }
  .ab-opt:hover, .ab-opt.active { background: var(--gold-dim); color: var(--gold-light); border-color: var(--gold); }
  .ab-opt.active-a { background: #1a3a2a; border-color: #27ae60; color: #2ecc71; }
  .ab-opt.active-b { background: #1a2a3a; border-color: #2980b9; color: #3498db; }
  .ab-opt.active-full { background: var(--gold-dim); border-color: var(--gold); color: var(--gold-light); }
  .ab-opt.ab-clear { background: #2a0a0a; border-color: var(--red); color: #e88; margin-top: 2px; }
  .ab-opt.ab-clear:hover { background: var(--red); color: white; }

  /* Badge A/B sul tavolo */
  .t-sub { font-size: 9px; font-weight: 700; margin-top: 1px; }

  /* Overlay chiudi menu */
  .ab-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 49;
  }
  .ab-overlay.open { display: block; }

  /* ARRIVATI bottone */
  .arrive-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .arrive-btn.checked {
    background: var(--green);
    border-color: var(--green-light);
    color: white;
    font-size: 18px;
  }
  .arrive-btn:active { opacity: 0.7; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🍽 Prenotazioni</h1>
    <div class="header-sub" id="headerSub">Caricamento...</div>
  </div>
  <a class="sheets-btn" href="https://docs.google.com/spreadsheets/d/1KKOC4yW4bbJXcd5mEmDfLkwvSgRDzwBj/edit" target="_blank" title="Apri Google Sheets">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="2" width="13" height="20" rx="2" fill="#0f9d58" opacity="0.15"/>
      <path d="M3 6h13M3 10h13M3 14h9M3 18h7" stroke="#0f9d58" stroke-width="1.8" stroke-linecap="round"/>
      <rect x="3" y="2" width="13" height="20" rx="2" stroke="#0f9d58" stroke-width="1.8"/>
      <path d="M14 2v5h5" stroke="#0f9d58" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M14 2l5 5" stroke="#0f9d58" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    Sheets
  </a>
  <button class="sync-btn" onclick="loadData()">
    <span id="syncIcon">↻</span> Aggiorna
  </button>
</header>

<div class="tabs" id="tabsBar"></div>

<div class="stats-bar" id="statsBar">
  <div class="stat"><div class="stat-val">-</div><div class="stat-lbl">Coperti</div></div>
</div>

<main>
  <div class="content">
    <div class="pren-section">
      <h2>Prenotazioni</h2>
      <div class="pren-list" id="prenList">
        <div class="loading">
          <span class="loading-spinner">⏳</span>
          Connessione a Google Sheets...
        </div>
      </div>
      <button class="add-btn" onclick="openNewModal()">
        <span>＋</span> Nuova prenotazione
      </button>
    </div>
  </div>
</main>

<!-- MODAL PIANTINA TAVOLI -->
<div class="modal-overlay" id="tableModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle">Scegli tavolo</div>
        <div class="modal-sub" id="modalSub"></div>
      </div>
      <button class="modal-close" onclick="closeTableModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#1a3a1a;border:2px solid #27ae60"></div> Libero</div>
        <div class="legend-item"><div class="legend-dot" style="background:#3a3000;border:2px solid #e6c800"></div> Parziale</div>
        <div class="legend-item"><div class="legend-dot" style="background:#3a1a1a;border:2px solid #c0392b"></div> Occupato</div>
        <div class="legend-item"><div class="legend-dot" style="background:#7a5520;border:2px solid #e8b96a"></div> Selezionato</div>
      </div>
      <div class="floor-plan">
        <div class="floor-label">Piantina sala</div>
        <div class="tables-grid" id="tablesGrid"></div>
      </div>
    </div>
    <div class="selection-bar">
      <div class="selection-info">
        <div style="font-size:11px;color:var(--text-dim)">Tavoli selezionati:</div>
        <div class="sel-tables" id="selTablesDisplay">—</div>
      </div>
      <button class="confirm-btn" id="confirmBtn" onclick="confirmTableSelection()" disabled>
        Conferma
      </button>
    </div>
  </div>
</div>

<!-- MODAL NUOVA PRENOTAZIONE -->
<div class="modal-overlay" id="newModal">
  <div class="modal new-modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">Nuova prenotazione</div>
        <div class="modal-sub" id="newModalSub"></div>
      </div>
      <button class="modal-close" onclick="closeNewModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Nome / Cognome</label>
        <input type="text" id="newNome" placeholder="Es. Rossi Mario" autocomplete="off">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Persone</label>
          <input type="number" id="newPersone" min="1" max="50" value="2">
        </div>
        <div class="form-group">
          <label>Ora arrivo</label>
          <input type="time" id="newOra" value="20:00">
        </div>
      </div>
      <div class="form-group">
        <label>Tavolo</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="text" id="newTavolo" placeholder="Tocca la piantina →" readonly style="flex:1;cursor:pointer" onclick="openTableModalForNew()">
          <button style="background:var(--gold-dim);border:1px solid var(--gold);color:var(--gold-light);border-radius:8px;padding:10px 14px;font-size:18px;cursor:pointer;flex-shrink:0" onclick="openTableModalForNew()">🗺</button>
        </div>
      </div>
      <div class="form-group">
        <label>Note</label>
        <input type="text" id="newNote" placeholder="Es. allergie, occasioni speciali...">
      </div>
      <button class="save-btn" onclick="saveNewPrenotazione()">💾 Salva prenotazione</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzfyS3IP2RKPK9livnAX73jDAgKfFUowvr22RTgJrjOmq9h3-6IZdNCG1x0RyXSapRKew/exec';

// Struttura tavoli: [numero, colonna_griglia (1-based), riga_griglia (1-based)]
// Griglia 7 colonne x 6 righe + zone speciali
const TAVOLI_LAYOUT = [
  // Fila 1 (in fondo, zona 60)
  { n: 61, col: 1, row: 1, zone: 'A' },

const ALL_TAVOLI = TAVOLI_LAYOUT.map(t => t.n);

let allData = {};       // dati grezzi da Sheets

let prenotazioni = [];  // prenotazioni del giorno corrente
let occupiedTables = new Set();
let selectedTables = new Set(); // selezione nella piantina
let editingRowIndex = null;     // null = nuova, number = modifica

// ─── LOAD DATA ─────────────────────────────────────────────────────────────
function loadData() {
  const icon = document.getElementById('syncIcon');
  icon.classList.add('spin');

  // Rimuovi vecchio script JSONP se presente
  const old = document.getElementById('jsonp_script');
  if (old) old.remove();

  // Callback globale
  const cbName = 'jsonpCallback_' + Date.now();
  window[cbName] = function(data) {
    try {
      allData = data;
      buildTabs();
      if (!currentSheet || !allData[currentSheet]) {
        const sheets = Object.keys(allData).filter(s => s !== 'TAVOLI');
        currentSheet = sheets[0] || '';
      }
      renderSheet(currentSheet);
      showToast('✓ Dati aggiornati');
    } catch(e) {
      showToast('⚠ Errore parsing: ' + e.message, true);
    } finally {
      icon.classList.remove('spin');
      delete window[cbName];
    }
  };

  const script = document.createElement('script');
  script.id = 'jsonp_script';
  script.onerror = function() {
    icon.classList.remove('spin');
    showToast('⚠ Errore connessione a Google Sheets', true);
    document.getElementById('prenList').innerHTML = `
      <div class="loading" style="color:var(--red-light)">
        <span>⚠️</span><br>
        Impossibile connettersi a Google Sheets.<br>
        <small style="color:var(--text-dim);margin-top:8px;display:block">Verifica che lo script sia pubblicato come "Chiunque"</small>
      </div>`;
  };
  script.src = SCRIPT_URL + '?callback=' + cbName + '&t=' + Date.now();
  document.head.appendChild(script);
}

// ─── TABS ───────────────────────────────────────────────────────────────────
function buildTabs() {
  const bar = document.getElementById('tabsBar');
  bar.innerHTML = '';
  const sheets = Object.keys(allData).filter(s => s !== 'TAVOLI');
  sheets.forEach(name => {
    const parts = name.split('-');
    const day = parts[0];
    const dayNames = ['','Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
    // parse date
    let label = name;
    let dayNum = day;
    try {
      const d = new Date(parts[2]+'-'+parts[1]+'-'+parts[0]);
      const dn = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'][d.getDay()];
      label = dn;
      dayNum = parseInt(parts[0]);
    } catch(e) {}

    const tab = document.createElement('div');
    tab.className = 'tab' + (name === currentSheet ? ' active' : '');
    tab.innerHTML = `<span class="day-name">${label}</span><span class="day-num">${dayNum}</span>`;
    tab.onclick = () => {
      currentSheet = name;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderSheet(name);
    };
    bar.appendChild(tab);
  });
}

// ─── RENDER SHEET ───────────────────────────────────────────────────────────
function renderSheet(sheetName) {
  document.getElementById('headerSub').textContent = sheetName;
  document.getElementById('newModalSub').textContent = sheetName;

  const rows = allData[sheetName] || [];
  // Trova header row (row con 'NOME')
  let headerIdx = -1;
  let tavoloCol = -1;
  let personeCol = -1;
  let arrivatoCol = -1;
  let oraCol = -1;
  let noteCol = -1;
  let nomeCol = 0;

  for (let i = 0; i < Math.min(3, rows.length); i++) {
    const r = rows[i].map(v => String(v || '').toUpperCase().trim());
    const ti = r.indexOf('TAVOLO');
    if (ti >= 0) {
      headerIdx = i;
      tavoloCol = ti;
      personeCol = r.indexOf('PERSONE');
      arrivatoCol = r.indexOf('ARRIVATI');
      oraCol = r.findIndex(v => v.includes('ORA'));
      noteCol = r.indexOf('NOTE');
      nomeCol = r.indexOf('NOME');
      break;
    }
  }

  // Costruisce lista prenotazioni
  prenotazioni = [];
  occupiedTables = new Set();

  if (headerIdx >= 0 && tavoloCol >= 0) {
    for (let i = headerIdx + 1; i < rows.length; i++) {
      const r = rows[i];
      const nome = nomeCol >= 0 ? (r[nomeCol] || '') : (r[0] || '');
      if (!nome && !r[tavoloCol]) continue;
      if (String(nome).toUpperCase().includes('TOTALE')) continue;

      const tavolo = String(r[tavoloCol] || '').trim();
      const persone = personeCol >= 0 ? (r[personeCol] || 0) : 0;
      const arrivato = arrivatoCol >= 0 ? r[arrivatoCol] : false;
      const ora = oraCol >= 0 ? (r[oraCol] || '') : '';
      const note = noteCol >= 0 ? (r[noteCol] || '') : '';

      const pren = { nome, tavolo, persone, arrivato, ora, note, rowIdx: i, tavoloColIdx: tavoloCol, sheetName };
      prenotazioni.push(pren);

      // Segna tavoli occupati
      extractTableNums(tavolo).forEach(n => occupiedTables.add(n));
    }
  }

  // Stats
  const totalPersone = prenotazioni.reduce((s, p) => s + (parseInt(p.persone) || 0), 0);
  const conTavolo = prenotazioni.filter(p => p.tavolo && !isSpecial(p.tavolo)).length;
  const senzaTavolo = prenotazioni.filter(p => !p.tavolo || isNaN(extractTableNums(p.tavolo)[0])).length;
  const arrivati = prenotazioni.filter(p => p.arrivato === true || String(p.arrivato).toUpperCase() === 'TRUE').length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="stat-val">${totalPersone}</div><div class="stat-lbl">Coperti</div></div>
    <div class="stat"><div class="stat-val">${prenotazioni.length}</div><div class="stat-lbl">Prenotaz.</div></div>
    <div class="stat"><div class="stat-val">${arrivati}</div><div class="stat-lbl">Arrivati</div></div>
    <div class="stat"><div class="stat-val">${ALL_TAVOLI.length - occupiedTables.size}</div><div class="stat-lbl">Tavoli liberi</div></div>
  `;

  // Render lista
  const list = document.getElementById('prenList');
  if (prenotazioni.length === 0) {
    list.innerHTML = '<div class="loading" style="padding:20px">Nessuna prenotazione trovata</div>';
    return;
  }

  list.innerHTML = '';
  prenotazioni.forEach((p, idx) => {
    const card = document.createElement('div');
    const hasTavolo = p.tavolo && extractTableNums(p.tavolo).length > 0;
    const arr = p.arrivato === true || String(p.arrivato).toUpperCase() === 'TRUE';
    card.className = 'pren-card ' + (arr ? 'arrived-card' : hasTavolo ? 'has-table' : 'no-table');
    card.innerHTML = `
      <button class="arrive-btn ${arr ? 'checked' : ''}" title="${arr ? 'Arrivato - clicca per annullare' : 'Segna come arrivato'}" onclick="toggleArrivo(${idx}, event)">
        ${arr ? '✓' : ''}
      </button>
      <div class="pren-name">${p.nome || '—'}</div>
      ${p.ora ? `<div class="pren-time">${p.ora}</div>` : ''}
      <div class="pren-persons">👥 ${parseInt(p.persone) || 0}</div>
      <div class="pren-table-badge ${hasTavolo ? '' : 'empty'}" onclick="openTableModal(${idx}, event)">
        ${p.tavolo || '+ Tavolo'}
      </div>
    `;
    if (p.note) {
      const noteEl = document.createElement('div');
      noteEl.className = 'pren-note';
      noteEl.style.paddingLeft = '42px';
      noteEl.textContent = '📝 ' + p.note;
      card.appendChild(noteEl);
    }
    list.appendChild(card);
  });
}

function isSpecial(val) {
  return /asporto|bar/i.test(String(val));
}

// ─── MODAL PIANTINA ─────────────────────────────────────────────────────────
let tableModalContext = null; // 'edit' o 'new'
let editingPrenIdx = null;

function openTableModal(prenIdx, event) {
  event && event.stopPropagation();

  document.getElementById('modalSub').textContent = document.getElementById('newNome').value || 'Nuova prenotazione';

// Mappa selezioni con suffisso: '34' = intero, '34/A' = solo A, '34/B' = solo B
// selectedTables ora contiene stringhe tipo '34', '34/A', '34/B'

function getTableBase(key) { return String(key).split('/')[0]; }
function getTableSuffix(key) { 
  const p = String(key).split('/');
  return p.length > 1 ? p[1] : null;
}

function extractTableNums(val) {
  if (!val) return [];
  const s = String(val);
  if (isSpecial(s)) return [];
  const nums = s.match(/\d+/g) || [];
  return nums.map(n => parseInt(n)).filter(n => ALL_TAVOLI.includes(n));
}

function extractTableKeys(val) {
  // Restituisce array di chiavi tipo ['34/A', '35', '36/B']
  if (!val) return [];
  const s = String(val).trim();
  if (isSpecial(s)) return [];
  // Ignora date o valori non tavolo
  if (s.includes('T') && s.includes(':') && s.includes('.')) return []; // è una data ISO
  // Splitta per - o spazio
  const parts = s.split(/[-\s]+/).map(p => p.trim()).filter(Boolean);
  return parts.filter(p => {
    // Accetta solo formato: numero opzionalmente seguito da /A o /B
    if (!/^\d+(\/[AB])?$/i.test(p)) return false;
    const base = parseInt(p);
    return ALL_TAVOLI.includes(base);
  });
}

let openAbMenu = null; // riferimento al menu aperto

function closeAllAbMenus() {
  document.querySelectorAll('.ab-menu.open').forEach(m => m.classList.remove('open'));
  const ov = document.getElementById('ab-overlay');
  if (ov) ov.classList.remove('open');
  openAbMenu = null;
}

function buildFloorPlan(skipPrenIdx) {
  const grid = document.getElementById('tablesGrid');
  const COLS = 7;
  const ROWS = 7;
  grid.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
  grid.innerHTML = '';

  // Overlay per chiudere menu
  let overlay = document.getElementById('ab-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.className = 'ab-overlay';
    overlay.id = 'ab-overlay';
    overlay.onclick = closeAllAbMenus;
    document.body.appendChild(overlay);
  }

  // Mappa occupazione per chiave (es. '34', '34/A', '34/B')
  const myKeys = skipPrenIdx !== null 
    ? new Set(extractTableKeys(prenotazioni[skipPrenIdx]?.tavolo))
    : new Set();

  // Costruisci mappa: numero tavolo -> {full: nome, a: nome, b: nome}
  const occupancyMap = {};
  prenotazioni.forEach((p, i) => {
    if (i === skipPrenIdx) return;
    const keys = extractTableKeys(p.tavolo);
    keys.forEach(key => {
      const base = parseInt(key);
      const suf = getTableSuffix(key);
      if (!occupancyMap[base]) occupancyMap[base] = {};
      if (!suf) occupancyMap[base].full = p.nome;
      else if (suf === 'A') occupancyMap[base].a = p.nome;
      else if (suf === 'B') occupancyMap[base].b = p.nome;
    });
  });

  const posMap = {};
  TAVOLI_LAYOUT.forEach(t => { posMap[`${t.row}-${t.col}`] = t; });

  for (let row = 1; row <= ROWS; row++) {
    for (let col = 1; col <= COLS; col++) {
      const key = `${row}-${col}`;
      const t = posMap[key];
      if (!t) { grid.appendChild(document.createElement('div')); continue; }

      const occ = occupancyMap[t.n] || {};
      const fullOccupied = !!occ.full;
      const aOccupied = !!occ.a;
      const bOccupied = !!occ.b;
      const bothOccupied = aOccupied && bOccupied;
      const isOccupied = fullOccupied || bothOccupied;

      // Selezione corrente su questo tavolo
      const selFull = selectedTables.has(String(t.n));
      const selA = selectedTables.has(`${t.n}/A`);
      const selB = selectedTables.has(`${t.n}/B`);
      const hasSel = selFull || selA || selB;

      // Label stato
      let subLabel = '';
      if (selFull) subLabel = 'INTERO';
      else if (selA && selB) subLabel = 'A+B';
      else if (selA) subLabel = '/A';
      else if (selB) subLabel = '/B';
      else if (aOccupied && !bOccupied) subLabel = 'B lib.';
      else if (bOccupied && !aOccupied) subLabel = 'A lib.';
      else if (fullOccupied) subLabel = occ.full.split(' ')[0].substring(0,7);

      const btn = document.createElement('button');
      const isPartial = (aOccupied || bOccupied) && !isOccupied;
      let btnClass = 'table-btn ';
      if (isOccupied) btnClass += 'occupied';
      else if (hasSel) btnClass += 'selected-table';
      else if (isPartial) btnClass += 'partial';
      else btnClass += 'free';
      btn.className = btnClass;

      btn.innerHTML = `
        <span class="t-num">${t.n}</span>
        ${subLabel ? `<span class="t-sub">${subLabel}</span>` : ''}
        <div class="ab-menu" id="abm-${t.n}">
          <div class="ab-opt ${selFull?'active-full':''}" data-t="${t.n}" data-s="">Intero</div>
          <div class="ab-opt ${selA?'active-a':''} ${aOccupied?'occupied':''}" data-t="${t.n}" data-s="A">${t.n}/A${aOccupied?' ✗':''}</div>
          <div class="ab-opt ${selB?'active-b':''} ${bOccupied?'occupied':''}" data-t="${t.n}" data-s="B">${t.n}/B${bOccupied?' ✗':''}</div>
          ${hasSel ? `<div class="ab-opt ab-clear" data-t="${t.n}" data-s="CLEAR">✕ Libera</div>` : ''}
        </div>
      `;

      if (!isOccupied) {
        btn.onclick = (e) => {
          e.stopPropagation();
          const menu = document.getElementById('abm-' + t.n);
          if (menu.classList.contains('open')) {
            closeAllAbMenus();
            return;
          }
          closeAllAbMenus();
          menu.classList.add('open');
          overlay.classList.add('open');
          openAbMenu = menu;

          // Click sulle opzioni
          menu.querySelectorAll('.ab-opt').forEach(opt => {
            if (opt.classList.contains('occupied')) return;
            opt.onclick = (ev) => {
              ev.stopPropagation();
              const tNum = opt.dataset.t;
              const suffix = opt.dataset.s;
              const fullKey = suffix ? `${tNum}/${suffix}` : tNum;
              selectTableOption(parseInt(tNum), fullKey, btn);
              closeAllAbMenus();
              buildFloorPlan(skipPrenIdx); // ridisegna
            };
          });
        };
      }

      grid.appendChild(btn);
    }
  }
}

function selectTableOption(tableNum, key, btn) {
  // Rimuovi tutte le selezioni per questo tavolo
  selectedTables.delete(String(tableNum));
  selectedTables.delete(`${tableNum}/A`);
  selectedTables.delete(`${tableNum}/B`);
  // Aggiungi la nuova selezione
  if (key && key !== 'CLEAR') {
    selectedTables.add(key);
  }
  updateSelectionBar();
}

function toggleTable(num, btn) {
  if (selectedTables.has(num)) {
    selectedTables.delete(num);
    btn.className = 'table-btn free';
  } else {
    selectedTables.add(num);
    btn.className = 'table-btn selected-table';
  }
  updateSelectionBar();
}

function updateSelectionBar() {
  const sorted = [...selectedTables].sort((a, b) => {
    const na = parseInt(a); const nb = parseInt(b);
    if (na !== nb) return na - nb;
    return a > b ? 1 : -1;
  });
  const display = document.getElementById('selTablesDisplay');
  const btn = document.getElementById('confirmBtn');
  if (sorted.length === 0) {
    display.textContent = 'Nessuno (libera)';
    display.style.color = 'var(--red-light)';
    btn.textContent = 'Libera';
    btn.disabled = false;
  } else {
    display.textContent = sorted.join(' · ');
    display.style.color = 'var(--gold-light)';
    btn.textContent = 'Conferma';
    btn.disabled = false;
  }
}

async function confirmTableSelection() {
  const sorted = [...selectedTables].sort((a, b) => {
    const na = parseInt(a); const nb = parseInt(b);
    if (na !== nb) return na - nb;
    return a > b ? 1 : -1;
  });
  const tableStr = sorted.join('-');

  if (tableModalContext === 'new') {
    document.getElementById('newTavolo').value = tableStr;
    closeTableModal();
    return;
  }

  // Modifica prenotazione esistente
  const p = prenotazioni[editingPrenIdx];
  closeTableModal();

  try {
    const icon = document.getElementById('syncIcon');
    icon.classList.add('spin');

    // Se nessun tavolo selezionato, svuota la cella (libera il tavolo)
    const body = {
      sheet: p.sheetName,
      row: p.rowIdx + 1,
      col: p.tavoloColIdx + 1,
      value: tableStr  // sarà '' se nessun tavolo selezionato
    };

    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(body)
    });

    if (tableStr) {
      showToast(`✓ Tavolo ${tableStr} assegnato a ${p.nome}`);
    } else {
      showToast(`✓ Tavolo liberato per ${p.nome}`);
    }
    await loadData();
  } catch(e) {
    showToast('⚠ Errore salvataggio: ' + e.message, true);
    document.getElementById('syncIcon').classList.remove('spin');
  }
}

// ─── TOGGLE ARRIVO ──────────────────────────────────────────────────────────
async function toggleArrivo(prenIdx, event) {
  event && event.stopPropagation();
  const p = prenotazioni[prenIdx];
  const wasArrived = p.arrivato === true || String(p.arrivato).toUpperCase() === 'TRUE';
  const newVal = !wasArrived;

  // Aggiorna UI subito (ottimistico)
  const btn = event.currentTarget;
  const card = btn.closest('.pren-card');
  btn.classList.toggle('checked', newVal);
  btn.textContent = newVal ? '✓' : '';
  card.className = 'pren-card ' + (newVal ? 'arrived-card' : (p.tavolo ? 'has-table' : 'no-table'));
  card.querySelector('.pren-name').style.color = newVal ? 'var(--green-light)' : '';

  // Trova colonna ARRIVATI
  const rows = allData[p.sheetName] || [];
  let arrivatoCol = -1;
  for (let i = 0; i < 3; i++) {
    const r = rows[i].map(v => String(v||'').toUpperCase().trim());
    const ai = r.indexOf('ARRIVATI');
    if (ai >= 0) { arrivatoCol = ai; break; }
  }
  if (arrivatoCol < 0) { showToast('⚠ Colonna ARRIVATI non trovata', true); return; }

  try {
    // Trova colonna NOME
    const rows2 = allData[p.sheetName] || [];
    let nomeCol = 1;
    for (let i = 0; i < 3; i++) {
      const r = rows2[i].map(v => String(v||'').toUpperCase().trim());
      const ni = r.indexOf('NOME');
      if (ni >= 0) { nomeCol = ni + 1; break; }
    }
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: 'arrivo',
        sheet: p.sheetName,
        row: p.rowIdx + 1,
        col: arrivatoCol + 1,
        nomeCol: nomeCol,
        value: newVal
      })
    });
    showToast(newVal ? `✓ ${p.nome} arrivato!` : `${p.nome} rimosso dagli arrivati`);
    // Aggiorna dato locale
    prenotazioni[prenIdx].arrivato = newVal;
    // Aggiorna stats
    const arrivati = prenotazioni.filter(p => p.arrivato === true).length;
    const statsBar = document.getElementById('statsBar');
    const statEls = statsBar.querySelectorAll('.stat-val');
    if (statEls[2]) statEls[2].textContent = arrivati;
  } catch(e) {
    showToast('⚠ Errore salvataggio: ' + e.message, true);
  }
}

// ─── INIT ───────────────────────────────────────────────────────────────────
loadData();
</script>
